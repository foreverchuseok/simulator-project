<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>KoELSA 경기북부지사 | 전기식 엘리베이터 3D 시뮬레이터</title>
  <style>
    /* ==========================================================================
     CSS RESET & BASE STYLES
     ========================================================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #12171f;
      color: #e2e8f0;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 3D 뷰포트 */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      outline: none;
    }

    /* 힌트 UI */
    .ui-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background-color: rgba(13, 17, 23, 0.88);
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.4;
      pointer-events: none;
      z-index: 80;
    }

    /* 플로팅 메뉴 버튼 */
    .menu-btn {
      position: absolute;
      z-index: 100;
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: white;
      width: 38px;
      height: 38px;
      font-size: 16px;
      cursor: grab;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    #btn-menu-left {
      top: 15px;
      left: 15px;
    }

    #btn-menu-right {
      top: 15px;
      right: 15px;
      background: #b62324;
    }

    /* 듀얼 패널 공통 */
    .panel {
      position: absolute;
      top: 0;
      height: 100vh;
      width: 180px;
      background: #0d1117;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      z-index: 90;
      transition: transform 0.3s ease;
    }

    #panel-left {
      left: 0;
      border-right: 1px solid #21262d;
      transform: translateX(-100%);
    }

    #panel-right {
      right: 0;
      border-left: 1px solid #21262d;
      transform: translateX(100%);
    }

    #panel-left.open {
      transform: translateX(0);
    }

    #panel-right.open {
      transform: translateX(0);
    }

    .panel-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.04em;
    }

    .panel-header p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background-color: #21262d;
      margin: 4px 0;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #8b949e;
      letter-spacing: 0.05em;
    }

    /* 상태 표시 UI */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-item {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
    }

    .status-item .label {
      font-size: 10px;
      color: #6b7280;
    }

    .status-item .value {
      font-size: 16px;
      font-weight: 700;
      margin-top: 4px;
      color: #58a6ff;
    }

    /* 층 선택 및 제어 버튼 */
    .floor-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }

    .floor-btn {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      font-weight: 700;
      padding: 12px 0;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }

    .floor-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
      background-color: #0d2045;
    }

    .floor-btn.active {
      background-color: #1f6feb;
      border-color: #58a6ff;
      color: #ffffff;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ctrl-btn {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      padding: 14px 8px;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .ctrl-btn.full-width {
      grid-column: 1 / -1;
    }

    .ctrl-btn.blue {
      background-color: #1f6feb;
      border-color: #58a6ff;
      color: #ffffff;
    }

    .ctrl-btn.red {
      background-color: #b62324;
      border-color: #f85149;
      color: #ffffff;
    }

    .ctrl-btn.green {
      background-color: #1a7f4a;
      border-color: #3fb950;
      color: #ffffff;
    }

    /* 옵션 셀렉트 박스 */
    .select-box {
      width: 100%;
      background-color: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
    }

    .notice-box {
      background-color: #221a0f;
      border: 1px solid #4d3a1e;
      color: #e3b341;
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
      margin-top: 4px;
      line-height: 1.5;
    }

    /* 토글 스위치 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #c9d1d9;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 22px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background-color: #21262d;
      border-radius: 11px;
      cursor: pointer;
      border: 1px solid #30363d;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background-color: #6b7280;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background-color: #1f6feb;
      border-color: #58a6ff;
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(20px);
      background-color: #ffffff;
    }

    /* 카메라 뷰 버튼 */
    .cam-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }

    .cam-btn {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 11px;
      padding: 10px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .cam-btn:hover {
      border-color: #a78bfa;
      color: #a78bfa;
      background-color: #1e1b4b;
    }

    /* 로딩 화면 */
    #loading {
      position: absolute;
      inset: 0;
      background-color: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    #loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #1e3a5f;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 초슬림 컴팩트 UI 스타일 */
    .icon-title {
      font-size: 9px;
      color: #8b949e;
      text-align: center;
      font-weight: 600;
      margin-top: 4px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 3px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .stat-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 6px;
      text-align: center;
    }

    .stat-val {
      font-size: 13px;
      font-weight: bold;
    }

    .stat-lbl {
      font-size: 8px;
      color: #6b7280;
    }

    .c-btn {
      background: #161b22;
      border: 1px solid #21262d;
      color: #c9d1d9;
      border-radius: 4px;
      padding: 6px 0;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .c-btn:hover {
      background: #21262d;
    }

    .c-btn.active {
      background: #1f6feb;
      color: white;
      border-color: #58a6ff;
    }

    .c-btn.green {
      background: #1a7f4a;
      color: white;
    }

    .c-btn.blue {
      background: #1f6feb;
      color: white;
    }

    .c-btn.red {
      background: #b62324;
      color: white;
    }

    .c-btn.warn {
      background: #d29922;
      color: #000;
    }
  </style>
</head>

<body>

  <!-- 3D 캔버스 영역 -->
  <div id="canvas-wrap">
    <button id="btn-menu-left" class="menu-btn">☰</button>
    <button id="btn-menu-right" class="menu-btn">⚙️</button>

    <div id="loading">
      <div class="spinner"></div>
      <span style="font-size:14px; color:#58a6ff; font-weight:bold;">
        N21436 시뮬레이터 구축 중...
      </span>
    </div>
    <canvas id="gl"></canvas>
    <div class="ui-hint">
      🖱 <b>좌클릭 드래그:</b> 화면 회전<br>
      🖱 <b>마우스 휠:</b> 확대 / 축소<br>
      🖱 <b>우클릭 드래그:</b> 화면 이동(Pan)
    </div>
  </div>

  <!-- 좌측 패널 (정상 운전) -->
  <div id="panel-left" class="panel">
    <div class="icon-title">STATUS</div>
    <div class="grid-2">
      <div class="stat-box">
        <div class="stat-val" id="v-floor" style="color:#3fb950">1F</div>
        <div class="stat-lbl">FLOOR</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="v-spd" style="color:#f0883e">0</div>
        <div class="stat-lbl">SPEED</div>
      </div>
    </div>

    <div class="icon-title">OP & CALL</div>
    <div class="grid-2">
      <button class="c-btn green" id="btn-open">◀▶</button>
      <button class="c-btn blue" id="btn-close">▶◀</button>
    </div>
    <div class="grid-4" id="fbtns">
      <div class="c-btn active" data-f="0">1F</div>
      <div class="c-btn" data-f="1">2F</div>
      <div class="c-btn" data-f="2">3F</div>
      <div class="c-btn" data-f="3">4F</div>
    </div>
    <button class="c-btn red" id="btn-estop">🔴 E-STOP</button>

    <div class="icon-title">SPEC</div>
    <select id="speed-select" class="c-btn" style="width:100%;">
      <option value="60">60 m/min</option>
      <option value="90">90 m/min</option>
    </select>

    <div class="icon-title">CAM</div>
    <div class="grid-2">
      <div class="c-btn" id="c-front">정면</div>
      <div class="c-btn" id="c-iso">ISO</div>
      <div class="c-btn" id="c-mr">기계실</div>
      <div class="c-btn" id="c-pit">피트</div>
      <div class="c-btn" id="c-car">카내부</div>
      <div class="c-btn" id="c-cwt">균형추</div>
    </div>
  </div>

  <!-- 우측 패널 (교관용 / 고장 및 점검) -->
  <div id="panel-right" class="panel">
    <div class="icon-title">INSTRUCTOR MODE</div>
    <div class="grid-2">
      <button class="c-btn blue">자동(AUTO)</button>
      <button class="c-btn warn">수동(MAN)</button>
    </div>

    <div class="icon-title">MANUAL JOG</div>
    <div class="grid-2">
      <button class="c-btn">▲ UP</button>
      <button class="c-btn">▼ DN</button>
    </div>

    <div class="icon-title">FAULT INJECTION (고장)</div>
    <button class="c-btn red">⚠️ 개문발차 (Door Fault)</button>
    <button class="c-btn red">⚠️ 돌상/돌하 (Overspeed)</button>
    <button class="c-btn red">⚠️ 추락방지안전장치</button>
  </div>

  <!-- 라이브러리 로드 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/environment.js"></script>
  <script src="js/elevator.js"></script>
  <script src="js/ui.js"></script>

  <script>
    // 층수 및 층고 배열 (피트 1.76m, 1층 4.0m, 2층 3.65m, 3층 3.7m)
    const FLOORS = 4;
    const PIT = 1.76;
    const OVERHEAD = 3.7; // 4.77에서 다른 층과 동일하게 3.7로 수정 (시각적 밸런스)
    const Y0 = 0; // 최하단 바닥

    const FLOOR_Y = [
      Y0 + PIT,
      Y0 + PIT + 4.0,
      Y0 + PIT + 4.0 + 3.65,
      Y0 + PIT + 4.0 + 3.65 + 3.7
    ];
    // 전체 승강로 높이
    const TOTAL_H = FLOOR_Y[3] + OVERHEAD;

    // 카 후면 위치 (Z축)
    const CAR_BACK_Z = -(S.CAR_D / 2);
    // 균형추 중앙 위치 (카 후면과 승강로 뒷벽 사이)
    const CWT_CENTER_Z = CAR_BACK_Z - 0.20;

    // 우측 카 가이드 레일 중심 X — 조속기/피트 인장추 (레일면에서 벽 쪽으로 동일 이격, 로프 수직 유지)
    const CAR_RAIL_REF_X = S.CAR_BG / 2;
    const GOV_TENS_OFFSET_X = 0.115; // 레일 중심 ~ 외측 인장축 (조속·인장추 동일 축)
    const GOV_TENS_X = CAR_RAIL_REF_X + GOV_TENS_OFFSET_X;

    // ---- [추가] 인디케이터 관리를 위한 배열 ----
    let indicators = [];

    /* ==========================================================================
       2. 상태 변수 및 Three.js 핵심 객체
       ========================================================================== */
    let curFloor = 0, moving = false, doorOpen = false, estop = false, autoTimer = null;
    const ELEVATOR_STATE = { IDLE: 'IDLE', MOVING: 'MOVING', DOOR_OPENING: 'DOOR_OPENING', DOOR_OPEN: 'DOOR_OPEN', DOOR_CLOSING: 'DOOR_CLOSING', ESTOP: 'ESTOP' };
    let currentState = ELEVATOR_STATE.IDLE;
    let targetSpeed = 60;

    let scene, camera, renderer, controls, clock;
    let carGrp, cwtGrp, railGrp, mrGrp, wallGrp, bufferGrp, pitGrp;
    let carDoorL, carDoorR, hatchDoors = [], ropeObjs = [];
    let mainSheaveGrp = null, governorWheelGrp = null, tensionSheaveGrp = null, sheaveSpeed = 0;
    const DEBUG_SENSOR = true;
    const USE_PHOTO_BG_PREVIEW = false; // true: koelsa/koelsa2 좌우 원경(흐림) / false: 3D 배경
    const landingDevices = [];
    const carSensors = {};
    const elevatorState = { direction: 0, speed: 0, slowdownActive: false, limitActive: false, finalLimitActive: false };

    function createBox(w, h, d, mat, px = 0, py = 0, pz = 0, parent = scene) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      mesh.position.set(px, py, pz); mesh.castShadow = true; mesh.receiveShadow = true;
      parent.add(mesh); return mesh;
    }
    function createCylinder(rt, rb, h, mat, px = 0, py = 0, pz = 0, parent = scene) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 20), mat);
      mesh.position.set(px, py, pz); mesh.castShadow = true; mesh.receiveShadow = true;
      parent.add(mesh); return mesh;
    }

    /* ==========================================================================
       4. 시스템 빌드
       ========================================================================== */
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x5a8cd9); // 맑은 하늘색 배경
      scene.fog = new THREE.FogExp2(0x5a8cd9, 0.006);

      const wrap = document.getElementById('canvas-wrap');
      camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 200);
      camera.position.set(14, Y0 + TOTAL_H * 0.4, 16);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl'), antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.physicallyCorrectLights = false;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.dampingFactor = 0.07;
      controls.target.set(0, Y0 + TOTAL_H * 0.4, 0);

      clock = new THREE.Clock();

      buildLighting();
      buildBackground();
      buildFrontWallAndLobby(); // 승장 및 점자블록
      buildGuideRails();        // 레일 (후면 균형추)
      buildShaftLandingDevices(); // 승강로 레일 측 센서 (층 인식용 도킹 센서)
      buildLimitSwitches();       // 승강로 좌측 레일 안전용 리미트 스위치
      buildMachineRoom();       // 기계실 및 도르래
      buildCarCabin();          // 엘리베이터 카 내부
      buildCarDoors();          // 유리 타공 카 도어
      buildHatchDoors();        // 승장 도어
      buildCounterWeight();     // 후면 균형추
      buildWireRopes();         // 로프
      buildPitFoundation();     // 피트
      updateBuffers();          // 동적 완충기

      bindUIEvents();

      setTimeout(() => { document.getElementById('loading').classList.add('hide'); renderLoop(); }, 500);
      window.addEventListener('resize', () => {
        camera.aspect = wrap.clientWidth / wrap.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      });
    }

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      if (moving) sheaveSpeed = targetSpeed / 30; else { sheaveSpeed *= 0.92; if (sheaveSpeed < 0.001) sheaveSpeed = 0; }
      if (mainSheaveGrp && sheaveSpeed > 0) mainSheaveGrp.rotation.z += sheaveSpeed * clock.getDelta();
      controls.update(); renderer.render(scene, camera);
    }

    init();
    makeDraggable(document.getElementById('btn-menu-left'));
    makeDraggable(document.getElementById('btn-menu-right'));
  </script>
</body>

</html>
