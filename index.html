<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KoELSA 경기북부지사 | 전기식 엘리베이터 3D 시뮬레이터</title>
  <style>
    /* ==========================================================================
     CSS RESET & BASE STYLES
     ========================================================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #12171f;
      color: #e2e8f0;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 3D 뷰포트 */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      outline: none;
    }

    /* 힌트 UI */
    .ui-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background-color: rgba(13, 17, 23, 0.88);
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.4;
      pointer-events: none;
      z-index: 80;
    }

    /* 플로팅 메뉴 버튼 */
    .menu-btn {
      position: absolute;
      z-index: 100;
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: white;
      width: 38px;
      height: 38px;
      font-size: 16px;
      cursor: grab;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    #btn-menu-left {
      top: 15px;
      left: 15px;
    }

    #btn-menu-right {
      top: 15px;
      right: 15px;
      background: #b62324;
    }

    /* 듀얼 패널 공통 */
    .panel {
      position: absolute;
      top: 0;
      height: 100vh;
      width: 180px;
      background: #0d1117;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      z-index: 90;
      transition: transform 0.3s ease;
    }

    #panel-left {
      left: 0;
      border-right: 1px solid #21262d;
      transform: translateX(-100%);
    }

    #panel-right {
      right: 0;
      border-left: 1px solid #21262d;
      transform: translateX(100%);
    }

    #panel-left.open {
      transform: translateX(0);
    }

    #panel-right.open {
      transform: translateX(0);
    }

    .panel-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: 0.04em;
    }

    .panel-header p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background-color: #21262d;
      margin: 4px 0;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: #8b949e;
      letter-spacing: 0.05em;
    }

    /* 상태 표시 UI */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-item {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
    }

    .status-item .label {
      font-size: 10px;
      color: #6b7280;
    }

    .status-item .value {
      font-size: 16px;
      font-weight: 700;
      margin-top: 4px;
      color: #58a6ff;
    }

    /* 층 선택 및 제어 버튼 */
    .floor-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }

    .floor-btn {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      font-weight: 700;
      padding: 12px 0;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }

    .floor-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
      background-color: #0d2045;
    }

    .floor-btn.active {
      background-color: #1f6feb;
      border-color: #58a6ff;
      color: #ffffff;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ctrl-btn {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      padding: 14px 8px;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .ctrl-btn.full-width {
      grid-column: 1 / -1;
    }

    .ctrl-btn.blue {
      background-color: #1f6feb;
      border-color: #58a6ff;
      color: #ffffff;
    }

    .ctrl-btn.red {
      background-color: #b62324;
      border-color: #f85149;
      color: #ffffff;
    }

    .ctrl-btn.green {
      background-color: #1a7f4a;
      border-color: #3fb950;
      color: #ffffff;
    }

    /* 옵션 셀렉트 박스 */
    .select-box {
      width: 100%;
      background-color: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
    }

    .notice-box {
      background-color: #221a0f;
      border: 1px solid #4d3a1e;
      color: #e3b341;
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
      margin-top: 4px;
      line-height: 1.5;
    }

    /* 토글 스위치 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #c9d1d9;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 22px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background-color: #21262d;
      border-radius: 11px;
      cursor: pointer;
      border: 1px solid #30363d;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background-color: #6b7280;
      border-radius: 50%;
      transition: 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background-color: #1f6feb;
      border-color: #58a6ff;
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(20px);
      background-color: #ffffff;
    }

    /* 카메라 뷰 버튼 */
    .cam-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
    }

    .cam-btn {
      background-color: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 11px;
      padding: 10px 4px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .cam-btn:hover {
      border-color: #a78bfa;
      color: #a78bfa;
      background-color: #1e1b4b;
    }

    /* 로딩 화면 */
    #loading {
      position: absolute;
      inset: 0;
      background-color: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    #loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #1e3a5f;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 초슬림 컴팩트 UI 스타일 */
    .icon-title {
      font-size: 9px;
      color: #8b949e;
      text-align: center;
      font-weight: 600;
      margin-top: 4px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 3px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .stat-box {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 4px;
      padding: 6px;
      text-align: center;
    }

    .stat-val {
      font-size: 13px;
      font-weight: bold;
    }

    .stat-lbl {
      font-size: 8px;
      color: #6b7280;
    }

    .c-btn {
      background: #161b22;
      border: 1px solid #21262d;
      color: #c9d1d9;
      border-radius: 4px;
      padding: 6px 0;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .c-btn:hover {
      background: #21262d;
    }

    .c-btn.active {
      background: #1f6feb;
      color: white;
      border-color: #58a6ff;
    }

    .c-btn.green {
      background: #1a7f4a;
      color: white;
    }

    .c-btn.blue {
      background: #1f6feb;
      color: white;
    }

    .c-btn.red {
      background: #b62324;
      color: white;
    }

    .c-btn.warn {
      background: #d29922;
      color: #000;
    }
  </style>
</head>

<body>

  <!-- 3D 캔버스 영역 -->
  <div id="canvas-wrap">
    <button id="btn-menu-left" class="menu-btn">☰</button>
    <button id="btn-menu-right" class="menu-btn">⚙️</button>

    <div id="loading">
      <div class="spinner"></div>
      <span style="font-size:14px; color:#58a6ff; font-weight:bold;">
        N21436 시뮬레이터 구축 중...
      </span>
    </div>
    <canvas id="gl"></canvas>
    <div class="ui-hint">
      🖱 <b>좌클릭 드래그:</b> 화면 회전<br>
      🖱 <b>마우스 휠:</b> 확대 / 축소<br>
      🖱 <b>우클릭 드래그:</b> 화면 이동(Pan)
    </div>
  </div>

  <!-- 좌측 패널 (정상 운전) -->
  <div id="panel-left" class="panel">
    <div class="icon-title">STATUS</div>
    <div class="grid-2">
      <div class="stat-box">
        <div class="stat-val" id="v-floor" style="color:#3fb950">1F</div>
        <div class="stat-lbl">FLOOR</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="v-spd" style="color:#f0883e">0</div>
        <div class="stat-lbl">SPEED</div>
      </div>
    </div>

    <div class="icon-title">OP & CALL</div>
    <div class="grid-2">
      <button class="c-btn green" id="btn-open">◀▶</button>
      <button class="c-btn blue" id="btn-close">▶◀</button>
    </div>
    <div class="grid-4" id="fbtns">
      <div class="c-btn active" data-f="0">1F</div>
      <div class="c-btn" data-f="1">2F</div>
      <div class="c-btn" data-f="2">3F</div>
      <div class="c-btn" data-f="3">4F</div>
    </div>
    <button class="c-btn red" id="btn-estop">🔴 E-STOP</button>

    <div class="icon-title">SPEC</div>
    <select id="speed-select" class="c-btn" style="width:100%;">
      <option value="60">60 m/min</option>
      <option value="90">90 m/min</option>
    </select>

    <div class="icon-title">CAM</div>
    <div class="grid-2">
      <div class="c-btn" id="c-front">정면</div>
      <div class="c-btn" id="c-iso">ISO</div>
      <div class="c-btn" id="c-mr">기계실</div>
      <div class="c-btn" id="c-pit">피트</div>
      <div class="c-btn" id="c-car">카내부</div>
      <div class="c-btn" id="c-cwt">균형추</div>
    </div>
  </div>

  <!-- 우측 패널 (교관용 / 고장 및 점검) -->
  <div id="panel-right" class="panel">
    <div class="icon-title">INSTRUCTOR MODE</div>
    <div class="grid-2">
      <button class="c-btn blue">자동(AUTO)</button>
      <button class="c-btn warn">수동(MAN)</button>
    </div>

    <div class="icon-title">MANUAL JOG</div>
    <div class="grid-2">
      <button class="c-btn">▲ UP</button>
      <button class="c-btn">▼ DN</button>
    </div>

    <div class="icon-title">FAULT INJECTION (고장)</div>
    <button class="c-btn red">⚠️ 개문발차 (Door Fault)</button>
    <button class="c-btn red">⚠️ 돌상/돌하 (Overspeed)</button>
    <button class="c-btn red">⚠️ 추락방지안전장치</button>
  </div>

  <!-- 라이브러리 로드 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/environment.js"></script>

  <script>
    // 층수 및 층고 배열 (피트 1.76m, 1층 4.0m, 2층 3.65m, 3층 3.7m)
    const FLOORS = 4;
    const PIT = 1.76;
    const OVERHEAD = 3.7; // 4.77에서 다른 층과 동일하게 3.7로 수정 (시각적 밸런스)
    const Y0 = 0; // 최하단 바닥

    const FLOOR_Y = [
      Y0 + PIT,
      Y0 + PIT + 4.0,
      Y0 + PIT + 4.0 + 3.65,
      Y0 + PIT + 4.0 + 3.65 + 3.7
    ];
    // 전체 승강로 높이
    const TOTAL_H = FLOOR_Y[3] + OVERHEAD;

    // 카 후면 위치 (Z축)
    const CAR_BACK_Z = -(S.CAR_D / 2);
    // 균형추 중앙 위치 (카 후면과 승강로 뒷벽 사이)
    const CWT_CENTER_Z = CAR_BACK_Z - 0.20;

    // 우측 카 가이드 레일 중심 X — 조속기/피트 인장추 (레일면에서 벽 쪽으로 동일 이격, 로프 수직 유지)
    const CAR_RAIL_REF_X = S.CAR_BG / 2;
    const GOV_TENS_OFFSET_X = 0.115; // 레일 중심 ~ 외측 인장축 (조속·인장추 동일 축)
    const GOV_TENS_X = CAR_RAIL_REF_X + GOV_TENS_OFFSET_X;

    // ---- [추가] 인디케이터 관리를 위한 배열 ----
    let indicators = [];

    /* ==========================================================================
       2. 상태 변수 및 Three.js 핵심 객체
       ========================================================================== */
    let curFloor = 0, moving = false, doorOpen = false, estop = false, autoTimer = null;
    let targetSpeed = 60;

    let scene, camera, renderer, controls, clock;
    let carGrp, cwtGrp, railGrp, mrGrp, wallGrp, bufferGrp, pitGrp;
    let carDoorL, carDoorR, hatchDoors = [], ropeObjs = [];
    let mainSheaveGrp = null, governorWheelGrp = null, tensionSheaveGrp = null, sheaveSpeed = 0;

    function createBox(w, h, d, mat, px = 0, py = 0, pz = 0, parent = scene) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      mesh.position.set(px, py, pz); mesh.castShadow = true; mesh.receiveShadow = true;
      parent.add(mesh); return mesh;
    }
    function createCylinder(rt, rb, h, mat, px = 0, py = 0, pz = 0, parent = scene) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 20), mat);
      mesh.position.set(px, py, pz); mesh.castShadow = true; mesh.receiveShadow = true;
      parent.add(mesh); return mesh;
    }

    /* ==========================================================================
       4. 시스템 빌드
       ========================================================================== */
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x5a8cd9); // 맑은 하늘색 배경
      scene.fog = new THREE.FogExp2(0x5a8cd9, 0.015);

      const wrap = document.getElementById('canvas-wrap');
      camera = new THREE.PerspectiveCamera(50, wrap.clientWidth / wrap.clientHeight, 0.1, 200);
      camera.position.set(14, Y0 + TOTAL_H * 0.4, 16);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gl'), antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.physicallyCorrectLights = true;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.dampingFactor = 0.07;
      controls.target.set(0, Y0 + TOTAL_H * 0.4, 0);

      clock = new THREE.Clock();

      buildLighting();
      buildBackground();
      buildFrontWallAndLobby(); // 승장 및 점자블록
      buildGuideRails();        // 레일 (후면 균형추)
      buildMachineRoom();       // 기계실 및 도르래
      buildCarCabin();          // 엘리베이터 카 내부
      buildCarDoors();          // 유리 타공 카 도어
      buildHatchDoors();        // 승장 도어
      buildCounterWeight();     // 후면 균형추
      buildWireRopes();         // 로프
      buildPitFoundation();     // 피트
      updateBuffers();          // 동적 완충기

      bindUIEvents();

      setTimeout(() => { document.getElementById('loading').classList.add('hide'); renderLoop(); }, 500);
      window.addEventListener('resize', () => {
        camera.aspect = wrap.clientWidth / wrap.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      });
    }

    function buildCarCabin() {
      carGrp = new THREE.Group();
      const W = S.CAR_W, D = S.CAR_D, H = S.CAR_H;
      const extMat = M.ss(0xd8e0e8);
      const intMat = M.ss(0xe5e7eb);

      createBox(0.025, H, D, extMat, -W / 2, 0, 0, carGrp);
      createBox(0.025, H, D, extMat, W / 2, 0, 0, carGrp);
      createBox(W + 0.05, H, 0.025, extMat, 0, 0, -D / 2, carGrp);
      createBox(W + 0.05, 0.05, D + 0.05, extMat, 0, H / 2 + 0.025, 0, carGrp);

      // 후면 거울
      const mirMat = M.ss(0xf3f4f6); mirMat.roughness = 0.0; mirMat.metalness = 1.0;
      createBox(W - 0.06, H - 0.05, 0.01, mirMat, 0, 0, -D / 2 + 0.03, carGrp);
      createBox(W - 0.02, 0.07, D - 0.02, M.marble(), 0, -H / 2 + 0.035, 0, carGrp); // 바닥

      // 골드 핸드레일
      const gMat = M.gold();
      const hr = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, W * 0.72, 14), gMat);
      hr.rotation.z = Math.PI / 2; hr.position.set(0, -0.32, -D / 2 + 0.075); carGrp.add(hr);

      // 추락방지안전장치 (GSB320DK)
      createBox(W - 0.06, 0.14, 0.16, M.paint(0xef4444), 0, -H / 2 - 0.07, 0, carGrp);

      // 크로스헤드 & 서스펜션 쉬브
      createBox(W + 0.1, 0.12, 0.16, M.ss(0x2a3a50), 0, H / 2 + 0.06, 0, carGrp);
      const susp = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 10, 28), M.ss(0x2a3a50));
      susp.position.set(0, H / 2 + 0.28, 0); carGrp.add(susp);

      // 조작반 (OPB)
      createBox(0.12, 0.55, 0.015, M.paint(0x111827), W / 2 - 0.04, -0.15, D / 2 - 0.03, carGrp);

      // 카 측 Landing Vane: 길쭉한 금속 베인(카 외측 배치)
      const landingVaneGrp = new THREE.Group();
      const vanePlateMat = M.paint(0xaaaaaa);
      const vaneFrameMat = M.paint(0x5b6b84);
      const vaneH = H - 0.18;
      createBox(0.012, vaneH, 0.014, vanePlateMat, 0, 0, 0, landingVaneGrp);
      createBox(0.065, 0.028, 0.028, vaneFrameMat, -0.028, vaneH / 2 - 0.08, 0, landingVaneGrp);
      createBox(0.065, 0.028, 0.028, vaneFrameMat, -0.028, -vaneH / 2 + 0.08, 0, landingVaneGrp);
      landingVaneGrp.position.set(W / 2 + 0.028, 0, 0.10);
      carGrp.add(landingVaneGrp);

      // Final Cam: 우측 카 외부에 길게 붙는 검정색 캠. 상/하 Final Limit 스위치를 작동시키는 교육용 형상
      const finalCamGrp = new THREE.Group();
      const finalCamMat = M.paint(0x0b1020);
      createBox(0.045, H + 0.35, 0.035, finalCamMat, 0, 0, 0, finalCamGrp);
      createCylinder(0.026, 0.026, 0.038, finalCamMat, 0, (H + 0.35) / 2, 0, finalCamGrp);
      createCylinder(0.026, 0.026, 0.038, finalCamMat, 0, -(H + 0.35) / 2, 0, finalCamGrp);
      [-0.85, 0, 0.85].forEach(y => {
        createBox(0.18, 0.035, 0.035, M.paint(0x5b6b84), -0.10, y, -0.05, finalCamGrp);
      });
      finalCamGrp.position.set(S.CAR_BG / 2 - 0.04, 0, 0.22);
      carGrp.add(finalCamGrp);

      carGrp.position.y = FLOOR_Y[0] + H / 2;
      scene.add(carGrp);
    }

    /* ==========================================================================
       [추가] 도어 안전 스티커 텍스처 (Canvas API로 픽토그램 자동 생성)
       ========================================================================== */
    let stickerMats = null;
    function getStickerMats() {
      if (stickerMats) return stickerMats;
      function make(type) {
        const c = document.createElement('canvas'); c.width = 128; c.height = 128;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,128,128); // 기본 배경

        if (type === 'L') {
          // [좌측] 손대지 마시오 픽토그램
          ctx.fillStyle = '#111'; ctx.fillRect(35,45,45,40); // 손바닥
          [25, 40, 55, 70].forEach((x, i) => ctx.fillRect(x, 25 + (i%2)*10, 12, 30)); // 손가락
          ctx.strokeStyle = '#e11d48'; ctx.lineWidth = 14; 
          ctx.beginPath(); ctx.moveTo(10,10); ctx.lineTo(118,118); ctx.stroke(); // 사선
        } else {
          // [우측] 기대면 추락위험 픽토그램
          ctx.fillStyle = '#facc15'; ctx.fillRect(64,0,64,128); // 우측 노란배경
          // 기대는 사람 (좌)
          ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(35,40,8,0,7); ctx.fill(); 
          ctx.fillRect(45,30,4,60); // 벽
          ctx.lineWidth = 6; ctx.strokeStyle = '#111';
          ctx.beginPath(); ctx.moveTo(35,48); ctx.lineTo(20,80); ctx.stroke();
          // 추락하는 사람 (우)
          ctx.beginPath(); ctx.arc(95,80,8,0,7); ctx.fill();
          ctx.beginPath(); ctx.moveTo(95,72); ctx.lineTo(80,30); ctx.stroke();
          // 사선 2개
          ctx.strokeStyle = '#e11d48'; ctx.lineWidth = 10;
          ctx.beginPath(); ctx.moveTo(5,5); ctx.lineTo(59,123); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(69,5); ctx.lineTo(123,123); ctx.stroke();
        }
        ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 8; ctx.strokeRect(0,0,128,128); // 테두리
        return new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true });
      }
      stickerMats = { L: make('L'), R: make('R') };
      return stickerMats;
    }

    function buildCarDoors() {
      const dw = S.DOOR_W / 2 + 0.02, dh = S.DOOR_H * 0.9, dt = 0.04;
      const dz = S.CAR_D / 2 + dt / 2;
      const mats = getStickerMats();

      function makeDoor(xSign) {
        const g = new THREE.Group();
        createBox(dw, dh, dt, M.ss(0xd8e0e8), 0, 0, 0, g);
        createBox(dw * 0.55, dh * 0.26, dt + 0.005, M.glass(), 0, dh * 0.3, 0, g); 
        
        const isLeftFromInside = xSign > 0;
        const sticker = new THREE.Mesh(new THREE.PlaneGeometry(0.12, 0.12), isLeftFromInside ? mats.L : mats.R);
        
        // [수정] 스티커 위치를 눈높이(+0.45) 및 중앙 분리대 쪽으로 이동
        const stickerX = -xSign * 0.18;
        sticker.position.set(stickerX, 0.45, -dt / 2 - 0.002); 
        sticker.rotation.y = Math.PI; 
        g.add(sticker);

        return g;
      }
      carDoorL = makeDoor(-1); carDoorR = makeDoor(1);

      const cx = dw / 2 + 0.006, ox = dw * 1.5 - 0.01;
      const dy = S.CAR_H / 2 - dh / 2 - 0.055;
      carDoorL.position.set(-cx, dy, dz); carDoorR.position.set(cx, dy, dz);
      carDoorL.userData = { cx: -cx, ox: -ox }; carDoorR.userData = { cx: cx, ox: ox };
      carGrp.add(carDoorL, carDoorR);
    }

    /**
     * 인디케이터 동기화: 전 층의 Canvas 텍스쳐를 실시간으로 업데이트
     */
    function syncAllIndicators(floorStr, dirStr) {
      indicators.forEach(ind => {
        const ctx = ind.ctx;
        // 블랙 베젤 배경
        ctx.fillStyle = '#0a0c0e';
        ctx.fillRect(0, 0, 256, 64);
        // 주황색 LED 텍스트 (방향 화살표 + 층수)
        ctx.fillStyle = '#f0883e';
        ctx.font = 'bold 36px "Malgun Gothic", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const text = dirStr ? `${dirStr}   ${floorStr}` : `${floorStr}`;
        ctx.fillText(text, 128, 36);
        ind.texture.needsUpdate = true;
      });
    }

    function buildHatchDoors() {
      hatchDoors.forEach(h => { scene.remove(h.left); scene.remove(h.right); });
      hatchDoors = [];
      indicators = [];

      const dw = S.DOOR_W / 2 + 0.02, dh = S.DOOR_H * 0.9, dt = 0.04;
      const hz = S.SHAFT_D / 2 + S.WALL_T * 0.3 + dt / 2;
      const jambZ = S.SHAFT_D / 2 + S.WALL_T / 2 + 0.04;
      const cx = dw / 2 + 0.006, ox = dw * 1.5 - 0.01;
      const panMat = M.ss(0x9ea4ac), jambMat = M.ss(0xb8bec7);
      const mats = getStickerMats(); // 스티커 로드

      for (let i = 0; i < FLOORS; i++) {
        const fy = FLOOR_Y[i];
        const dy = fy + dh / 2 + 0.06;

        function makeHatchDoor(xSign) {
          const g = new THREE.Group();
          createBox(dw, dh, dt, panMat, 0, 0, 0, g);
          for (let s = -1; s <= 1; s++) {
            createBox(0.006, dh - 0.04, dt + 0.003, M.ss(0x7a8290), s * (dw * 0.25), 0, 0, g);
          }
          
          const isLeftFromLobby = xSign < 0;
          const sticker = new THREE.Mesh(new THREE.PlaneGeometry(0.12, 0.12), isLeftFromLobby ? mats.L : mats.R);
          
          // [수정] 외부 도어 스티커 역시 눈높이 및 중앙 분리대 쪽으로 이동
          const stickerX = -xSign * 0.18;
          sticker.position.set(stickerX, 0.45, dt / 2 + 0.002); 
          g.add(sticker);

          return g;
        }

        const hl = makeHatchDoor(-1), hr = makeHatchDoor(1);
        hl.position.set(-cx, dy, hz); hr.position.set(cx, dy, hz);
        hl.userData = { cx: -cx, ox: -ox }; hr.userData = { cx: cx, ox: ox };
        hatchDoors.push({ left: hl, right: hr });
        scene.add(hl, hr);

        const jambW = 0.18;
        createBox(jambW, dh + 0.05, 0.06, jambMat, -(S.DOOR_W / 2 + jambW / 2 + 0.01), dy, jambZ, scene);
        createBox(jambW, dh + 0.05, 0.06, jambMat, (S.DOOR_W / 2 + jambW / 2 + 0.01), dy, jambZ, scene);
        const topW = S.DOOR_W + jambW * 2 + 0.02;
        createBox(topW, 0.06, 0.06, jambMat, 0, fy + dh + 0.09, jambZ, scene);

        const transH = 0.55;
        const transY = fy + dh + 0.09 + 0.03 + transH / 2;
        createBox(topW, transH, 0.055, jambMat, 0, transY, jambZ, scene);

        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const tex = new THREE.CanvasTexture(canvas);
        const ledMat = new THREE.MeshStandardMaterial({ color: 0x0a0c0e, emissive: 0xffffff, emissiveMap: tex, emissiveIntensity: 2.5 });
        createBox(0.45, 0.12, 0.01, ledMat, 0, transY, jambZ + 0.03, scene);
        indicators.push({ ctx: ctx, texture: tex });
      }
      syncAllIndicators('1', '');
    }


    function buildCounterWeight() {
      cwtGrp = new THREE.Group();
      const fMat = M.ss(0x1f2937);
      createBox(S.CWT_W, S.CWT_H, 0.04, fMat, 0, 0, -S.CWT_D / 2 - 0.01, cwtGrp);
      createBox(S.CWT_W, S.CWT_H, 0.04, fMat, 0, 0, S.CWT_D / 2 + 0.01, cwtGrp);
      for (let i = 0; i < 20; i++) {
        createBox(S.CWT_W - 0.01, (S.CWT_H - 0.1) / 20 - 0.01, S.CWT_D - 0.02, M.paint(0x374151), 0, -S.CWT_H / 2 + 0.05 + (i + 0.5) * ((S.CWT_H - 0.1) / 20), 0, cwtGrp);
      }
      const shv = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.022, 10, 28), fMat);
      shv.rotation.y = Math.PI / 2; shv.position.y = S.CWT_H / 2 + 0.12; cwtGrp.add(shv);

      // 카가 1층일 때 균형추는 상부에 있어야 하며, 카가 4층까지 올라가도 피트 아래로 내려가지 않게 기준을 맞춤
      const cwtBottomClearance = 0.35;
      const carTravel = FLOOR_Y[FLOORS - 1] - FLOOR_Y[0];
      const cwtTopStartY = Y0 + cwtBottomClearance + S.CWT_H / 2 + carTravel;
      cwtGrp.position.set(0, cwtTopStartY, CWT_CENTER_Z);
      scene.add(cwtGrp);
    }

    function buildWireRopes() {
      const shvY = mrGrp.userData.shvY, defY = mrGrp.userData.defY, defZ = mrGrp.userData.defZ;
      const rMat = M.rope();
      // [수정] 3. 로프 5가닥 동기화
      for (let i = 0; i < 5; i++) {
        const rx = -0.04 + i * 0.02; // 메인 쉬브/보조 시브 홈과 동일한 간격
        const line = new THREE.Line(new THREE.BufferGeometry(), rMat);
        ropeObjs.push({ line: line, shvY: shvY, defY: defY, defZ: defZ, rx: rx });
        scene.add(line);
      }
    }

    function refreshRopes() {
      const cy = carGrp.position.y + S.CAR_H / 2 + 0.28;
      const wy = cwtGrp.position.y + S.CWT_H / 2 + 0.12;
      ropeObjs.forEach(r => {
        // [수정] 카 중앙 -> 메인 쉬브 -> 보조 시브(하향 조정) -> 균형추 로핑 궤적 동기화
        const pts = [
          new THREE.Vector3(r.rx, cy, 0),
          new THREE.Vector3(r.rx, r.shvY, 0),
          new THREE.Vector3(r.rx, r.defY, r.defZ),
          new THREE.Vector3(r.rx, wy, r.defZ),
        ];
        r.line.geometry.setFromPoints(pts);
      });
    }

    /* ==========================================================================
       5. 로직 및 이벤트 바인딩
       ========================================================================== */
    function updateStatus(id, txt, col) { const e = document.getElementById(id); if (e) { e.textContent = txt; if (col) e.style.color = col; } }

    function openDoors(cb) {
      if (gsap.isTweening(carDoorL.position) || moving || estop) return;
      doorOpen = true; updateStatus('v-door', '열리는 중', '#f0883e'); clearTimeout(autoTimer);
      gsap.to(carDoorL.position, { x: carDoorL.userData.ox, duration: 1.15, ease: 'power2.out' });
      gsap.to(carDoorR.position, {
        x: carDoorR.userData.ox, duration: 1.15, ease: 'power2.out', onComplete: () => {
          updateStatus('v-door', '완전 개방', '#3fb950'); if (cb) cb();
          autoTimer = setTimeout(() => { if (doorOpen && !moving) closeDoors(); }, 3500);
        }
      });
      const h = hatchDoors[curFloor];
      if (h) { gsap.to(h.left.position, { x: h.left.userData.ox, duration: 1.15, ease: 'power2.out' }); gsap.to(h.right.position, { x: h.right.userData.ox, duration: 1.15, ease: 'power2.out' }); }
    }

    function closeDoors(cb) {
      if (!doorOpen) { if (cb) cb(); return; }
      clearTimeout(autoTimer); updateStatus('v-door', '닫히는 중', '#f0883e');
      gsap.to(carDoorL.position, { x: carDoorL.userData.cx, duration: 0.95, ease: 'power2.inOut' });
      gsap.to(carDoorR.position, {
        x: carDoorR.userData.cx, duration: 0.95, ease: 'power2.inOut', onComplete: () => {
          doorOpen = false; updateStatus('v-door', '닫힘', '#3fb950'); if (cb) cb();
        }
      });
      const h = hatchDoors[curFloor];
      if (h) { gsap.to(h.left.position, { x: h.left.userData.cx, duration: 0.95, ease: 'power2.inOut' }); gsap.to(h.right.position, { x: h.right.userData.cx, duration: 0.95, ease: 'power2.inOut' }); }
    }

    function rotateGovernorTension(deltaY) {
      if (!deltaY) return;
      const govR = (mrGrp && mrGrp.userData && mrGrp.userData.govR) || 0.14;
      if (governorWheelGrp) governorWheelGrp.rotation.z -= deltaY / govR;
      if (tensionSheaveGrp) tensionSheaveGrp.rotation.x += deltaY / 0.15;
    }

    function moveElevator(fIdx) {
      if (moving || estop || fIdx === curFloor) return;
      if (doorOpen || gsap.isTweening(carDoorL.position)) { closeDoors(() => moveElevator(fIdx)); return; }

      moving = true;
      const ty = FLOOR_Y[fIdx] + S.CAR_H / 2, cy = carGrp.position.y;
      const cwtY = cwtGrp.position.y;
      let prevCarY = cy;
      const dur = Math.max(Math.abs(ty - cy) / (targetSpeed / 60), 0.5);

      // 운행 방향 화살표 결정
      const isUp = ty > cy;
      const dirStr = isUp ? '↑' : '↓';
      updateStatus('v-dir', isUp ? '▲ 상승' : '▼ 하강', '#3fb950');

      gsap.to(carGrp.position, {
        y: ty, duration: dur, ease: 'power2.inOut',
        onUpdate: () => {
          const deltaY = carGrp.position.y - prevCarY;
          prevCarY = carGrp.position.y;
          rotateGovernorTension(deltaY);
          cwtGrp.position.y = cwtY - (carGrp.position.y - cy);
          refreshRopes();

          // 실시간 높이(Y축)에 따른 통과 층수 계산 및 인디케이터 업데이트
          let currentDisplayFloor = 1;
          for (let i = FLOORS - 1; i >= 0; i--) {
            if (carGrp.position.y >= FLOOR_Y[i]) { currentDisplayFloor = i + 1; break; }
          }
          syncAllIndicators(currentDisplayFloor, dirStr);

          const p = Math.min(Math.max((carGrp.position.y - cy) / (ty - cy), 0), 1);
          updateStatus('v-spd', Math.round(targetSpeed * Math.sin(p * Math.PI)) + ' m/min', '#f0883e');
          const l = scene.getObjectByName('carLight'); if (l) l.position.y = carGrp.position.y + S.CAR_H * 0.75;
        },
        onComplete: () => {
          curFloor = fIdx; moving = false;
          // 도착 완료 시 화살표 제거하고 해당 층수만 표시
          syncAllIndicators(fIdx + 1, '');
          updateStatus('v-dir', '정지 대기', '#8b949e');
          updateStatus('v-spd', '0 m/min', '#f0883e');
          updateStatus('v-floor', (fIdx + 1) + 'F', '#3fb950');
          document.querySelectorAll('#fbtns .c-btn').forEach((b, i) => b.classList.toggle('active', i === fIdx));
          setTimeout(() => openDoors(), 300);
        }
      });
    }

    function bindUIEvents() {
      document.getElementById('btn-menu-left').addEventListener('click', () => document.getElementById('panel-left').classList.toggle('open'));
      document.getElementById('btn-menu-right').addEventListener('click', () => document.getElementById('panel-right').classList.toggle('open'));

      document.querySelectorAll('input[name="speed"]').forEach(r => {
        r.addEventListener('change', e => {
          targetSpeed = parseInt(e.target.value);
          updateBuffers();
        });
      });
      document.getElementById('speed-select').addEventListener('change', e => {
        targetSpeed = parseInt(e.target.value);
        updateBuffers();
      });

      document.getElementById('fbtns').addEventListener('click', e => {
        const btn = e.target.closest('.c-btn'); if (btn) moveElevator(parseInt(btn.dataset.f));
      });
      document.getElementById('btn-open').addEventListener('click', () => { if (!moving && !estop) openDoors(); });
      document.getElementById('btn-close').addEventListener('click', () => { if (!moving) closeDoors(); });

      document.getElementById('btn-estop').addEventListener('click', e => {
        estop = !estop;
        if (estop) {
          gsap.killTweensOf(carGrp.position); gsap.killTweensOf(cwtGrp.position); moving = false;
          updateStatus('v-dir', '■ 비상정지', '#f85149'); updateStatus('v-spd', '0 m/min');
          e.target.textContent = '▶ 운전 재개 (RESET)'; e.target.className = 'c-btn blue';
        } else {
          e.target.textContent = '🔴 E-STOP'; e.target.className = 'c-btn red'; updateStatus('v-dir', '정지 대기', '#8b949e');
        }
      });

      document.getElementById('t-wall')?.addEventListener('change', e => { if (wallGrp) wallGrp.visible = e.target.checked; });
      document.getElementById('t-rope')?.addEventListener('change', e => { ropeObjs.forEach(r => r.line.visible = e.target.checked); });

      const midY = Y0 + TOTAL_H * 0.4;
      document.getElementById('c-front').addEventListener('click', () => moveCam(14, midY, 16, 0, midY, 0));
      document.getElementById('c-iso').addEventListener('click', () => moveCam(16, midY + 6, 16, 0, midY, 0));
      document.getElementById('c-mr').addEventListener('click', () => moveCam(5, Y0 + TOTAL_H + 1.5, 5, 0, Y0 + TOTAL_H + 1.5, 0));
      document.getElementById('c-pit').addEventListener('click', () => moveCam(5, Y0 + 1.0, 5, 0, Y0 + 1.0, 0));
      document.getElementById('c-car').addEventListener('click', () => {
        const cy = carGrp.position.y; moveCam(0, cy, S.CAR_D / 2 + 0.5, 0, cy - 0.1, 0);
      });
      document.getElementById('c-cwt').addEventListener('click', () => {
        const cy = cwtGrp.position.y; moveCam(-4, cy, CWT_CENTER_Z + 2, 0, cy, CWT_CENTER_Z);
      });
    }

    function moveCam(cx, cy, cz, tx, ty, tz) {
      gsap.to(camera.position, { x: cx, y: cy, z: cz, duration: 1.2, ease: 'power2.inOut' });
      gsap.to(controls.target, { x: tx, y: ty, z: tz, duration: 1.2, onUpdate: () => controls.update() });
    }

    function renderLoop() {
      requestAnimationFrame(renderLoop);
      if (moving) sheaveSpeed = targetSpeed / 30; else { sheaveSpeed *= 0.92; if (sheaveSpeed < 0.001) sheaveSpeed = 0; }
      if (mainSheaveGrp && sheaveSpeed > 0) mainSheaveGrp.rotation.z += sheaveSpeed * clock.getDelta();
      controls.update(); renderer.render(scene, camera);
    }

    // 플로팅 메뉴 버튼 드래그 로직
    function makeDraggable(btn) {
      let isDragging = false, startX, startY, initialLeft, initialTop, dragged = false;
      btn.addEventListener('mousedown', (e) => {
        isDragging = true; dragged = false; startX = e.clientX; startY = e.clientY;
        initialLeft = btn.offsetLeft; initialTop = btn.offsetTop; btn.style.cursor = 'grabbing';
      });
      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragged = true;
        btn.style.left = `${initialLeft + dx}px`; btn.style.top = `${initialTop + dy}px`; btn.style.right = 'auto';
      });
      document.addEventListener('mouseup', () => { isDragging = false; btn.style.cursor = 'grab'; });
      btn.addEventListener('click', (e) => { if (dragged) e.stopImmediatePropagation(); }, true);
    }

    init();
    makeDraggable(document.getElementById('btn-menu-left'));
    makeDraggable(document.getElementById('btn-menu-right'));
  </script>
</body>
